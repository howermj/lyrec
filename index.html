<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>lyrec</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>lyrec</h1>
      <p class="subtitle">Lyra's Album Recommendations</p>
    </header>

    <div id="status-bar">
      <span id="data-status">Loading...</span>
    </div>

    <div id="scanner-container">
      <div id="reader"></div>
      <button id="scan-btn" class="btn-primary" disabled>Start Scanner</button>
    </div>

    <div id="result-container" class="hidden">
      <div id="result-card">
        <div id="result-badge"></div>
        <div id="result-artist"></div>
        <div id="result-album"></div>
        <div class="result-details">
          <div class="detail-row">
            <span class="detail-label">Completion</span>
            <span id="result-completion" class="detail-value"></span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Format</span>
            <span id="result-format" class="detail-value"></span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Encoding</span>
            <span id="result-encoding" class="detail-value"></span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Recommendation</span>
            <span id="result-recommendation" class="detail-value"></span>
          </div>
        </div>
        <div id="result-barcode" class="barcode-display"></div>
        <button id="dismiss-btn" class="btn-secondary">Scan Next</button>
      </div>
    </div>

    <div id="not-found-container" class="hidden">
      <div id="not-found-card">
        <div class="not-found-icon">?</div>
        <div class="not-found-text">Not in library</div>
        <div id="not-found-barcode" class="barcode-display"></div>
        <button id="dismiss-nf-btn" class="btn-secondary">Scan Next</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
